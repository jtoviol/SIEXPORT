<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SIEDFASER — Acceso</title>
  <link rel="icon" type="image/jpeg" href="/static/siexport_logo.jpeg" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50:"#eff5fb", 100:"#dae6f3", 200:"#b5d0e8",
              500:"#3b6ea8", 600:"#2e5786", 700:"#234674",
              800:"#1a3960", 900:"#13294a"
            }
          }
        }
      }
    };
  </script>
  <style>
    @keyframes shake {
      0%,100% { transform:translateX(0); }
      15%     { transform:translateX(-8px); }
      30%     { transform:translateX(8px); }
      45%     { transform:translateX(-5px); }
      60%     { transform:translateX(5px); }
      75%     { transform:translateX(-3px); }
      90%     { transform:translateX(3px); }
    }
    @keyframes fade-up {
      from { opacity:0; transform:translateY(24px); }
      to   { opacity:1; transform:translateY(0); }
    }
    @keyframes float {
      0%,100% { transform:translateY(0px) rotate(0deg); }
      33%     { transform:translateY(-10px) rotate(1deg); }
      66%     { transform:translateY(-5px) rotate(-1deg); }
    }
    @keyframes blob {
      0%,100% { border-radius:60% 40% 70% 30% / 50% 60% 40% 50%; transform:scale(1); }
      33%     { border-radius:40% 60% 30% 70% / 60% 40% 60% 40%; transform:scale(1.05); }
      66%     { border-radius:70% 30% 50% 50% / 30% 70% 50% 60%; transform:scale(.97); }
    }
    .shake   { animation: shake .5s cubic-bezier(.36,.07,.19,.97) both; }
    .fade-up { animation: fade-up .55s cubic-bezier(.22,1,.36,1) both; }
    .logo-float { animation: float 5s ease-in-out infinite; }
    .blob    { animation: blob 7s ease-in-out infinite; }

    .inp {
      transition: border-color .18s, box-shadow .18s, background .18s;
    }
    .inp:focus {
      outline: none;
      border-color: #234674;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(35,70,116,.13);
    }
    .btn-login {
      background: linear-gradient(135deg, #1a3960 0%, #234674 45%, #3b6ea8 100%);
      box-shadow: 0 4px 18px rgba(35,70,116,.38), 0 1px 3px rgba(0,0,0,.12);
      transition: transform .18s, box-shadow .18s, filter .18s;
    }
    .btn-login:hover:not(:disabled) {
      transform: translateY(-2px) scale(1.015);
      box-shadow: 0 8px 28px rgba(35,70,116,.45), 0 2px 6px rgba(0,0,0,.14);
      filter: brightness(1.08);
    }
    .btn-login:active:not(:disabled) {
      transform: translateY(0) scale(.98);
      box-shadow: 0 2px 10px rgba(35,70,116,.3);
    }
    .btn-login:disabled { opacity:.65; cursor:not-allowed; }
  </style>
</head>

<body class="min-h-screen flex items-center justify-center p-4 relative overflow-hidden"
      style="font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
             background:linear-gradient(145deg,#dce8f4 0%,#eaf1f8 30%,#f1f5f9 60%,#e6eef6 100%)">

  <!-- Blobs decorativos de fondo -->
  <div class="blob absolute -top-24 -left-24 h-80 w-80 opacity-30 pointer-events-none"
       style="background:radial-gradient(circle,#93c5fd,#bfdbfe,transparent);animation-delay:0s"></div>
  <div class="blob absolute -bottom-16 -right-16 h-96 w-96 opacity-25 pointer-events-none"
       style="background:radial-gradient(circle,#bbf7d0,#86efac,transparent);animation-delay:-3s"></div>
  <div class="blob absolute top-1/3 right-1/4 h-56 w-56 opacity-20 pointer-events-none"
       style="background:radial-gradient(circle,#c7d2fe,#a5b4fc,transparent);animation-delay:-5s"></div>

  <!-- Tarjeta principal -->
  <div class="relative w-full max-w-[420px] fade-up">

    <!-- Halo superior -->
    <div class="absolute -top-8 left-1/2 -translate-x-1/2 h-14 w-64 rounded-full blur-2xl opacity-45 pointer-events-none"
         style="background:linear-gradient(90deg,#234674,#3b6ea8,#22a84a)"></div>

    <div class="relative rounded-3xl overflow-hidden bg-white"
         style="box-shadow:0 30px 70px -15px rgba(26,57,96,.22),0 0 0 1px rgba(26,57,96,.07)">

      <!-- Barra superior degradada -->
      <div class="h-1.5"
           style="background:linear-gradient(90deg,#1a3960 0%,#3b6ea8 55%,#22a84a 100%)"></div>

      <div class="px-8 pt-8 pb-6">

        <!-- Logo + Marca -->
        <div class="flex flex-col items-center mb-7">
          <div class="logo-float mb-4">
            <div class="relative">
              <div class="absolute inset-0 rounded-2xl blur-lg opacity-30"
                   style="background:linear-gradient(135deg,#234674,#22a84a)"></div>
              <img src="/static/siexport_logo.jpeg" alt="SIEDFASER"
                   class="relative h-20 w-auto object-contain rounded-2xl"
                   style="filter:drop-shadow(0 6px 18px rgba(35,70,116,.28))"/>
            </div>
          </div>
          <div class="text-center leading-none">
            <div class="text-3xl font-black tracking-wide mb-1">
              <span style="color:#22a84a">SIED</span><span style="color:#1a2f6e">FASER</span>
            </div>
            <div class="text-[10px] font-semibold uppercase tracking-[.14em]"
                 style="color:#94a3b8">
              Sistema inteligente de exportación de datos para facturación de Seragil
            </div>
          </div>
        </div>

        <!-- Separador -->
        <div class="flex items-center gap-3 mb-6">
          <div class="flex-1 h-px" style="background:linear-gradient(90deg,transparent,#e2e8f0)"></div>
          <span class="text-[10px] font-bold uppercase tracking-[.12em] text-slate-400">Iniciar sesión</span>
          <div class="flex-1 h-px" style="background:linear-gradient(90deg,#e2e8f0,transparent)"></div>
        </div>

        <!-- Banner de error -->
        <div id="err-banner"
             class="hidden mb-5 flex items-center gap-2.5 px-4 py-3 rounded-xl
                    bg-red-50 border border-red-200 text-red-700 text-xs font-medium">
          <svg class="h-4 w-4 shrink-0" fill="none" viewBox="0 0 24 24"
               stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
                  d="M12 9v2m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
          Usuario o contraseña incorrectos. Intenta de nuevo.
        </div>

        <!-- Formulario -->
        <form id="login-form" method="POST" action="/auth/login" class="space-y-4">

          <!-- Usuario -->
          <div>
            <label for="username"
                   class="block text-[10px] font-bold uppercase tracking-[.1em] text-slate-500 mb-1.5">
              Usuario
            </label>
            <div class="relative">
              <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">
                <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                     stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round"
                        d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                </svg>
              </span>
              <input id="username" name="username" type="text"
                     required autocomplete="username" autofocus
                     placeholder="Ingresa tu usuario"
                     class="inp w-full h-11 pl-10 pr-4 rounded-xl border border-slate-200
                            bg-slate-50 text-sm text-slate-900 placeholder-slate-400"/>
            </div>
          </div>

          <!-- Contraseña -->
          <div>
            <label for="password"
                   class="block text-[10px] font-bold uppercase tracking-[.1em] text-slate-500 mb-1.5">
              Contraseña
            </label>
            <div class="relative">
              <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">
                <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                     stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round"
                        d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                </svg>
              </span>
              <input id="password" name="password" type="password"
                     required autocomplete="current-password"
                     placeholder="Ingresa tu contraseña"
                     class="inp w-full h-11 pl-10 pr-11 rounded-xl border border-slate-200
                            bg-slate-50 text-sm text-slate-900 placeholder-slate-400"/>
              <button type="button" onclick="togglePwd()" tabindex="-1"
                      class="absolute right-3.5 top-1/2 -translate-y-1/2 text-slate-400
                             hover:text-slate-600 transition-colors">
                <svg id="eye-icon" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                     stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round"
                        d="M15 12a3 3 0 11-6 0 3 3 0 016 0z
                           M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943
                           9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                </svg>
              </button>
            </div>
          </div>

          <!-- Botón -->
          <button type="submit" id="btn-login"
                  class="btn-login w-full h-12 rounded-xl text-white text-sm font-bold
                         tracking-wide flex items-center justify-center gap-2 mt-1">
            <span id="btn-label">Ingresar</span>
            <svg id="btn-icon" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                 stroke="currentColor" stroke-width="2.5">
              <path stroke-linecap="round" stroke-linejoin="round"
                    d="M13 7l5 5m0 0l-5 5m5-5H6"/>
            </svg>
          </button>

        </form>

      </div>

      <!-- Footer -->
      <div class="px-8 py-3.5 border-t border-slate-100"
           style="background:linear-gradient(135deg,#f8fafc,#f1f5f9)">
        <p class="text-center text-[10px] font-medium text-slate-400 tracking-wide">
          Acceso restringido &middot; Solo personal autorizado
        </p>
      </div>

    </div>
  </div>

<script>
  // Mostrar error si viene de intento fallido
  if (new URLSearchParams(location.search).get("error")) {
    const banner = document.getElementById("err-banner");
    banner.classList.remove("hidden");
    const card = document.querySelector(".fade-up");
    card.classList.remove("shake");
    void card.offsetWidth;
    card.classList.add("shake");
  }

  function togglePwd() {
    const inp  = document.getElementById("password");
    const icon = document.getElementById("eye-icon");
    const isHidden = inp.type === "password";
    inp.type = isHidden ? "text" : "password";
    icon.innerHTML = isHidden
      ? `<path stroke-linecap="round" stroke-linejoin="round"
               d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7
                  a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243
                  M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29
                  M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943
                  9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>`
      : `<path stroke-linecap="round" stroke-linejoin="round"
               d="M15 12a3 3 0 11-6 0 3 3 0 016 0z
                  M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943
                  9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>`;
  }

  // Spinner al hacer submit
  document.getElementById("login-form").addEventListener("submit", () => {
    const btn  = document.getElementById("btn-login");
    const lbl  = document.getElementById("btn-label");
    const ico  = document.getElementById("btn-icon");
    btn.disabled = true;
    lbl.textContent = "Verificando...";
    ico.innerHTML = `<path stroke-linecap="round"
      d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>`;
    ico.style.animation = "spin 1s linear infinite";
    ico.style.cssText += ";@keyframes spin{to{transform:rotate(360deg)}}";
  });
</script>
</body>
</html>
